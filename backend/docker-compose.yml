services:
  postgres:
    image: postgres:16-alpine
    container_name: cola-gym-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cola_gym
      POSTGRES_PASSWORD: cola_gym
      POSTGRES_DB: cola_gym
    ports:
      - "5433:5432"
    volumes:
      - cola_gym_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cola_gym -d cola_gym"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cola_gym_postgres_data:
