name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cola_gym
          POSTGRES_PASSWORD: cola_gym
          POSTGRES_DB: cola_gym
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cola_gym -d cola_gym"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: cola_gym
      DB_PASSWORD: cola_gym
      DB_DATABASE: cola_gym
      DB_SSL: "false"
      DB_SYNCHRONIZE: "false"
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 8h
      ADMIN_EMAIL: owner@cola-gym.local
      ADMIN_PASSWORD: owner123456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - run: npm ci
        working-directory: backend
      - run: npm run db:migrate
        working-directory: backend
      - run: npm run lint:check
        working-directory: backend
      - run: npm test
        working-directory: backend
      - run: npm run test:e2e
        working-directory: backend
      - run: npm run build
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
